name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Unit tests + offline dry-run need only pyyaml + pytest (no Snowflake driver).
      - name: Install test deps
        run: pip install pyyaml pytest

      - name: Unit tests
        run: python -m pytest tests/ -q

      - name: Compile scripts + loader
        run: python -m compileall -q scripts loader

      - name: Loader offline dry-run (masking + flow, no DB)
        run: python -m loader --dry-run --config config/loader.sample.yaml

      - name: Data generator smoke
        run: python -m scripts.generate_synthetic_data --num-patients 20 --out-dir /tmp/gen

  # Live deploy + validation would run here on a protected environment using repo secrets
  # (SNOWFLAKE_ACCOUNT / USER / PASSWORD) to build ~/.snowflake/connections.toml, then:
  #   python -m scripts.run_sql --dir sql/00_setup
  #   python -m scripts.data_quality
  # Omitted from PR CI so no credentials are required to validate the code.
