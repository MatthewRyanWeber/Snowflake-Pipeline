# Snowflake environment — object names (NON-SECRET, safe to commit).
#
# Credentials are NOT here. They live in ~/.snowsql/config as a named connection
# DEV environment config. Same objects, separate database (HEALTH_ANALYTICS_DEV).
# so nothing is hardcoded inside the SQL.

# SnowSQL named connection to use ([connections.<name>] in ~/.snowsql/config)
SF_CONNECTION=snowflake_pipeline

# RBAC + compute
SF_ROLE=PIPELINE_ROLE
SF_WAREHOUSE=PIPELINE_WH
SF_WH_SIZE=XSMALL
SF_WH_AUTO_SUSPEND=60

# Database + schemas
SF_DATABASE=HEALTH_ANALYTICS_DEV
SF_SCHEMA_RAW=RAW
SF_SCHEMA_STAGING=STAGING
SF_SCHEMA_MARTS=MARTS

# --- Phase 1 · Snowpipe / S3 ingestion ---
# ARNs and bucket URLs are not secrets, but they're environment-specific: fill these in
# after you create the S3 bucket + IAM role. See docs/snowpipe-setup.md.
SF_STORAGE_INTEGRATION=HEALTH_S3_INT
SF_STAGE=HEALTH_STAGE
SF_S3_URL=s3://REPLACE_ME_BUCKET/health/
SF_STORAGE_AWS_ROLE_ARN=arn:aws:iam::REPLACE_ME_ACCOUNT:role/REPLACE_ME_ROLE
