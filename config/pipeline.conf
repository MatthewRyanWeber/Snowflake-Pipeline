# Snowflake environment — object names (NON-SECRET, safe to commit).
#
# Credentials are NOT here. They live in ~/.snowsql/config as a named connection
# (see docs/phase0-foundation.md). This file only names the objects deploy.sh creates,
# so nothing is hardcoded inside the SQL.

# SnowSQL named connection to use ([connections.<name>] in ~/.snowsql/config)
SF_CONNECTION=snowflake_pipeline

# RBAC + compute
SF_ROLE=PIPELINE_ROLE
SF_WAREHOUSE=PIPELINE_WH
SF_WH_SIZE=XSMALL
SF_WH_AUTO_SUSPEND=60

# Database + schemas
SF_DATABASE=HEALTH_ANALYTICS
SF_SCHEMA_RAW=RAW
SF_SCHEMA_STAGING=STAGING
SF_SCHEMA_MARTS=MARTS
